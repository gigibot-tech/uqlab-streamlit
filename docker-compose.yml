version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: uqlab-minio
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Create default bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: uqlab-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/uqlab-artifacts --ignore-existing;
      mc anonymous set download myminio/uqlab-artifacts;
      echo 'MinIO bucket uqlab-artifacts created and configured';
      "
    restart: "no"

volumes:
  minio_data:
    driver: local

