[mypy]
# Mypy configuration for walaris-cen project
# This is OPTIONAL - the code works fine without mypy installed

# Python version
python_version = 3.10

# Import discovery
mypy_path = $MYPY_CONFIG_FILE_DIR
namespace_packages = True
explicit_package_bases = True

# Strictness settings (gradually increase as you improve type coverage)
# Start lenient, can be made stricter over time
warn_return_any = False
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Disallow untyped definitions (disabled for now, enable gradually)
disallow_untyped_defs = False
disallow_untyped_calls = False
disallow_incomplete_defs = False
check_untyped_defs = True

# Error reporting
show_error_context = True
show_column_numbers = True
show_error_codes = True
pretty = True

# Incremental mode
incremental = True
cache_dir = .mypy_cache

# Per-module options for gradual typing

[mypy-uq_classification.config_schema]
# New module with full type coverage
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-tests.*]
# Tests should have good type coverage
disallow_untyped_defs = True

# Third-party libraries without stubs (ignore missing imports)
[mypy-torch.*]
ignore_missing_imports = True

[mypy-torchvision.*]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-PIL.*]
ignore_missing_imports = True

[mypy-cv2.*]
ignore_missing_imports = True

[mypy-pytest.*]
ignore_missing_imports = True

