[pytest]
# Pytest configuration for walaris-cen project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    # Verbose output
    -v
    # Show local variables in tracebacks
    --showlocals
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Coverage report (optional, only if pytest-cov is installed)
    # --cov=uq_classification
    # --cov=src
    # --cov-report=term-missing
    # --cov-report=html

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require data files)
    slow: Slow tests (feature extraction, training)
    gpu: Tests requiring GPU
    optional: Tests for optional features (can be skipped)

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 3.9

