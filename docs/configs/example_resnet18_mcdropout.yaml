# Example configuration for ResNet18 MC Dropout architecture
# This demonstrates the new architecture selector feature

seed: 42
device: auto

data:
  noise_type: worst
  under_supported_classes: "3,5"
  under_train_per_class: 10
  regular_train_per_class: 500
  eval_per_group: 600
  aleatoric_noise_percentage: 0.0

model:
  # New architecture selector
  architecture: resnet18_mcdropout
  training_mode: end_to_end
  
  # Common parameters
  hidden_dim: 512
  dropout: 0.3

training:
  epochs: 12
  learning_rate: 0.001
  weight_decay: 0.0001
  train_batch_size: 256
  feature_batch_size: 64

evaluation:
  mc_passes: 20
  top_k: 10

paths:
  cifar10n_root: ./data/cifar10n
  results_base_dir: ./results
  feature_cache_dir: ./cache/fast_uncertainty_classification/features

