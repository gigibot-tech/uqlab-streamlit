# Default Experiment Configuration
# This file works with Hydra for advanced config management (optional)
# Can also be loaded directly with YAML

# Random seed for reproducibility
seed: 42

# Device selection (auto, cpu, cuda, mps, cuda:0, etc.)
device: auto

# Data configuration
data:
  noise_type: worse_label
  under_supported_classes: "3,5"  # Comma-separated class IDs or "random:N"
  under_train_per_class: 50
  regular_train_per_class: 300
  eval_per_group: 600

# Model architecture
model:
  dinov2_model: small  # small, base, large, giant
  hidden_dim: 256
  dropout: 0.2
  use_untrained_resnet: false

# Training hyperparameters
training:
  epochs: 12
  learning_rate: 0.001
  weight_decay: 0.0001
  train_batch_size: 256
  feature_batch_size: 64

# Evaluation settings
evaluation:
  mc_passes: 20
  top_k: 10
  attribution_method: dualxda

# File paths
paths:
  cifar10n_root: ./data/cifar10n
  feature_cache_dir: ./cache/fast_uncertainty_classification/features
  results_base_dir: ./results

