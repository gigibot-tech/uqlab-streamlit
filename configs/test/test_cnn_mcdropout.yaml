dataset:
  name: cifar10n
  noise_type: worse_label
  under_supported: "random:2"
  under_train_per_class: 50
  regular_train_per_class: 300
  eval_per_group: 100

model:
  architecture: cnn_mcdropout
  training_mode: end_to_end
  hidden_dim: 128
  dropout: 0.5
  num_conv_layers: 3
  conv_channels: [32, 64, 64]

training:
  epochs: 5
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 128

evaluation:
  mc_passes: 10

